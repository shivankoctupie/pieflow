<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body {
    margin: 0; padding: 0; background: transparent; overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    -webkit-user-select: none; user-select: none;
  }
  #pill {
    position: absolute; left: 50%; bottom: 12px; transform: translateX(-50%);
    display: flex; align-items: center; gap: 10px;
    background: rgba(28, 27, 26, 0.92);
    color: #fff; border-radius: 999px;
    padding: 10px 18px;
    min-width: 130px; max-width: 296px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.35);
    opacity: 0; transition: opacity .15s ease;
    justify-content: center;
  }
  #pill.visible { opacity: 1; }
  #pill.cmd { background: rgba(64, 42, 110, 0.94); }
  #bars { display: flex; align-items: center; gap: 3px; height: 22px; }
  #bars span {
    width: 4px; border-radius: 2px; background: #ff8b66;
    height: 6px; transition: height .08s ease;
  }
  #pill.cmd #bars span { background: #b691ff; }
  #label { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .spinner {
    width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,.25); border-top-color: #fff;
    animation: spin .8s linear infinite; flex: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .check { color: #7be3a2; font-size: 15px; }
  .err { color: #ff9c9c; }
</style>
</head>
<body>
  <div id="pill">
    <div id="bars" style="display:none">
      <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="spinner" id="spin" style="display:none"></div>
    <div class="check" id="check" style="display:none">&#10003;</div>
    <div id="label">PieFlow</div>
  </div>
<script src="overlay.js"></script>
</body>
</html>
